  <!-- Konten Utama Halaman -->
  <main class="main-wrapper">
    <div class="container">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold m-0" style="font-size: 16px !important;">Tambah Data Obat</h2>
        <a href="dataobat.html" class="btn btn-outline-secondary">🔙 Kembali</a>
      </div>
      
      <div class="card p-4">
        <form action="simpan_obat.php" method="POST" enctype="multipart/form-data">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Nama Obat*</label>
              <input name="nama_obat" type="text" class="form-control" required>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Golongan*</label>
              <input name="golongan" type="text" class="form-control" required>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Manfaat</label>
              <input name="manfaat" type="text" class="form-control">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Dosis Pemakaian</label>
              <input name="dosis" type="text" class="form-control">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Stok</label>
              <input name="stok" type="number" class="form-control" min="0">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Harga Beli (Rp)*</label>
              <div class="input-group">
                <span class="input-group-text">Rp</span>
                <input name="harga_beli" type="number" class="form-control" required>
              </div>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Harga Jual (Rp)*</label>
              <div class="input-group">
                <span class="input-group-text">Rp</span>
                <input name="harga_jual" type="number" class="form-control" required>
              </div>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Keterangan Lain</label>
              <textarea name="keterangan" class="form-control" rows="3"></textarea>
            </div>
          </div>
          <button type="submit" class="btn btn-success mt-4">Simpan Data</button>
        </form>
      </div>
    </div>
  </main>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
