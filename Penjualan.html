<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Penjualan Obat • GoApotek</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <style>
    /* 1. Reset Universal & Lock Layar */
    * { font-size: 12px; box-sizing: border-box; }
    html, body { background-color: #e0f7fa; margin: 0; padding: 0; width: 100%; overflow-x: hidden; }

    /* 2. Sidebar Tetap */
    .sidebar { position: fixed; top: 0; left: 0; width: 200px; height: 100vh; background-color: #cca8e9; padding: 20px 10px; z-index: 1000; }
    .sidebar a { display: block; padding: 10px 15px; text-decoration: none; color: #333; font-weight: 500; }
    .sidebar a:hover, .sidebar a.active { background: rgba(255,255,255,0.4); border-radius: 5px; }

    /* 3. Submenu Style (Konsisten) */
    .submenu-box { padding: 5px 0 10px 15px; background: rgba(0,0,0,0.05); border-radius: 4px; margin: 5px 0 10px 0; }
    .submenu-box a {
      padding: 6px 10px !important; 
      margin: 0 6px 3px 6px !important; 
      font-size: 11px !important;   
      font-weight: 500 !important;
      text-decoration: none !important;
      color: #333 !important;
      display: block !important;
      border-radius: 5px;
    }
    .submenu-box a:hover, .submenu-box a.active {
      background: rgba(255,255,255,0.5); 
    }

    /* 4. Main Wrapper */
    .main-wrapper { margin-left: 200px; padding: 20px; width: calc(100vw - 200px); }

    /* 5. Kartu Produk (Statis) */
    .card { 
      border: none; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
      height: 260px; 
      transition: 0.3s; background: #fff;
    }
    .card:hover { transform: translateY(-5px); box-shadow: 0 6px 12px rgba(0,0,0,0.1); }
    .card-img-wrapper { height: 100px; display: flex; justify-content: center; align-items: center; padding-top: 10px; }
    .card-img-top { height: 80px; width: auto; max-width: 90%; object-fit: contain; cursor: pointer; }
    .qty-input { width: 60px; padding: 2px 5px; text-align: center; }
    .badge-best-seller { position: absolute; top: 8px; left: 8px; background: #ff5722; color: #fff; padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: bold; }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <nav class="sidebar">
    <a href="#" class="fw-bold mb-2 d-block" style="pointer-events: none;">💊 GoApotek</a>
    <a href="index.html">🏠 Beranda Sistem</a>
    <a href="beranda-dokter.html">👨‍⚕️ Beranda Dokter</a>
    <a href="#subMenuData" data-bs-toggle="collapse" class="d-flex justify-content-between align-items-center" aria-expanded="true">
      <span>📁 Data</span><i class="bi bi-chevron-down"></i>
    </a>
    <div class="collapse show submenu-box" id="subMenuData">
      <a href="dataobat.html">💊 Data Obat</a>
      <a href="dokterpraktek.html">🩺 Dokter Praktek</a>
      <a href="riwayatkunjungan.html">📅 Riwayat Kunjungan</a>
      <a href="rekammedis.html">📋 Rekam Medis</a>
      <a href="Penjualan.html" class="active">🛒 Penjualan</a>
      <a href="user.html">🧑‍🧒‍🧒 User</a>
    </div>
    <a href="laporan.html">📈 Laporan</a>
    <a href="logout.html">🚪 Logout</a>
  </nav>

  <main class="main-wrapper">
    <div class="container-fluid">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0" style="font-size: 16px !important;">Penjualan Obat</h2>
        <div class="d-flex gap-2">
          <input type="text" id="cariObat" class="form-control form-control-sm" style="width: 200px;" placeholder="Cari obat...">
          <a href="prosescheckout.html" class="btn btn-sm btn-outline-success fw-bold d-flex align-items-center gap-2">
            <i class="bi bi-cart3"></i> Keranjang <span id="jumlahKeranjang" class="badge bg-danger">0</span>
          </a>
        </div>
      </div>
      <div class="row g-3" id="daftarObat"></div>
    </div>
  </main>

  <script>
    const obatList = [
      { id: 1, nama: 'Paracetamol', harga: 10000, stok: 100, img: 'aset/obat1.jpg' },
      { id: 2, nama: 'Decolsin', harga: 10000, stok: 150, img: 'aset/decolsin.jpg' },
      { id: 3, nama: 'Kapsida', harga: 30000, stok: 200, img: 'aset/kapsida.webp' },
      { id: 4, nama: 'Ibuprofen', harga: 10000, stok: 250, img: 'aset/ibuprofen.png' },
      { id: 5, nama: 'Amoxicillin', harga: 4000, stok: 50, img: 'aset/amoxicillin.webp' },
      { id: 6, nama: 'Diazepam', harga: 8000, stok: 20, img: 'aset/Diazepam.jpg' }
    ];

    function renderObat(filter = "") {
      const daftarObat = document.getElementById("daftarObat");
      daftarObat.innerHTML = "";
      obatList.filter(o => o.nama.toLowerCase().includes(filter.toLowerCase())).forEach(obat => {
        const col = document.createElement("div");
        col.className = "col-md-3 col-lg-2"; 
        col.innerHTML = `
          <div class="card position-relative">
            ${obat.nama === 'Decolsin' ? '<span class="badge-best-seller">BEST SELLER🔥</span>' : ''}
            <div class="card-img-wrapper">
              <img src="${obat.img}" class="card-img-top" onclick="window.location.href='detailobat.html?id=${obat.id}'" alt="${obat.nama}">
            </div>
            <div class="card-body text-center p-2 d-flex flex-column justify-content-between">
              <h6 class="card-title fw-bold mb-1">${obat.nama}</h6>
              <p class="text-muted small mb-1">Rp ${obat.harga.toLocaleString()}</p>
              <div>
                <input type="number" id="qty-${obat.id}" class="form-control qty-input mb-1 mx-auto" value="1" min="1" max="${obat.stok}">
                <button onclick="tambahKeKeranjang(${obat.id})" class="btn btn-sm btn-success w-100">Tambah</button>
              </div>
            </div>
          </div>
        `;
        daftarObat.appendChild(col);
      });
    }

    function tambahKeKeranjang(id) {
      const qty = document.getElementById(`qty-${id}`).value;
      Swal.fire({
        icon: 'success',
        title: 'Berhasil',
        text: `Obat berhasil ditambahkan ke keranjang!`,
        timer: 1500,
        showConfirmButton: false
      });
    }

    document.getElementById("cariObat").addEventListener("input", (e) => {
      renderObat(e.target.value);
    });

    document.addEventListener("DOMContentLoaded", () => { renderObat(); });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script> 
</body>
</html>
