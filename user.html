<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User - GoApotek</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  
<style>
  /* 1. Tambahkan ini: Mencegah body bergeser walau ada konten panjang */
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    overflow-x: hidden; /* <--- INI KUNCI MENGHILANGKAN SCROLL HORIZONTAL */
    background-color: #e0f7fa;
  }

  * { 
    font-size: 12px; 
    box-sizing: border-box; /* Memastikan padding tidak menambah lebar elemen */
  }
  
  .sidebar { 
    position: fixed; 
    top: 0; 
    left: 0; 
    width: 200px; 
    height: 100vh; 
    background-color: #cca8e9; 
    padding: 20px 10px; 
    z-index: 1000; 
  }

  .sidebar a { display: block; padding: 10px 15px; text-decoration: none; color: #333; font-weight: 500; }
  .sidebar a:hover, .sidebar a.active { background: rgba(255,255,255,0.4); border-radius: 5px; }
  
  /* Gunakan 100vw untuk mengunci lebar tepat sesuai layar */
  .main-wrapper { 
    margin-left: 200px; 
    padding: 20px; 
    width: calc(100vw - 200px); 
    min-height: 100vh;
  }
  
  .card-container { 
    display: flex; 
    flex-wrap: wrap; 
    gap: 20px; 
    justify-content: flex-start;
  }

  .card { 
    flex: 0 0 220px; /* <--- PENTING: Mengunci kartu agar tidak ikut melar/menciut */
    width: 220px !important; 
    border: none; 
    box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
    display: flex;
    flex-direction: column;
    height: 320px; 
  }

  .card-img-top { 
    height: 180px; 
    width: 220px; /* Kunci lebar gambar */
    object-fit: cover; 
    background-color: #f8f9fa; 
    padding: 5px; 
    border-bottom: 1px solid #eee;
  }
</style>
</head>
<body>

 <!-- Sidebar -->
  <nav class="sidebar">

    <a href="#subMenuData" data-bs-toggle="collapse" class="d-flex justify-content-between align-items-center">
      <span>📁 Data</span>

    </a>
    
    <div class="collapse show" id="subMenuData" style="padding-left: 15px; background: rgba(0,0,0,0.05); border-radius: 4px;">

      <a href="Penjualan.html">🛒 Penjualan</a>

    <a href="laporan.html">📈 Laporan</a>
    <a href="logout.html">🚪 Logout</a>
  </nav>

  <main class="main-wrapper">
    <div class="container">
      <div class="d-flex justify-content-between align-items-center mb-4">

        <a href="tambahuser.html" class="btn btn-primary btn-sm">+ Tambah User</a>
      </div>
      
      <div class="card-container">
        <div class="card">
          <img src="aset/Alisa.jpg" class="card-img-top" alt="Alisa">
          <div class="card-body">
            <h6 class="card-title">Alisa</h6>
            <p class="card-text"><strong>Admin</strong></p>
            <a href="detailuser1.html" class="btn btn-sm btn-success">Detail</a>
          </div>
        </div>
        <div class="card">
          <img src="aset/Anggota1.jpeg" class="card-img-top" alt="Anggota1">

          </div>
        </div>
        <div class="card">
          <img src="aset/Anggota2.jpeg" class="card-img-top" alt="Anggota2">
          <div class="card-body">
            <h6 class="card-title">Mutiara Saskia</h6>

  </main>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/js/bootstrap.bundle.min.js"></script>
