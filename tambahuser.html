<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tambah Data User - GoApotek</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    /* RESET & DASAR UTAMA - Konsisten dengan Standar Layout GoApotek */
    html, body {
      max-width: 100%;
      overflow-x: hidden;
      background-color: #e0f7fa; /* Warna Background Ghibli Cyan */
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
    }
    
    /* Font Ukuran Global Konstan 12px-13px */
    body, p, a, div, h1, h2, h3, h4, h5, h6, table, th, td, button, select, input, label, textarea {
      font-size: 13px !important;
    }

    /* SIDEBAR KIRI - Lebar Tetap Presisi Sesuai Gambar 1 */
    .sidebar { 
      position: fixed; 
      top: 0; 
      left: 0; 
      width: 200px; 
      height: 100vh; 
      background-color: #cca8e9; /* Warna Ungu Khas */
      padding: 20px 10px; 
      z-index: 1000; 
    }

    .sidebar a { 
      display: block; 
      padding: 10px 15px; 
      text-decoration: none; 
      color: #333; 
      font-weight: 500; 
    }
    
    .sidebar a:hover, .sidebar a.active { 
      background: rgba(255, 255, 255, 0.4); 
      border-radius: 5px; 
    }

    .submenu-box {
      padding-left: 15px; 
      background: rgba(0,0,0,0.05); 
      border-radius: 4px;
    }

    /* AREA KONTEN SEBELAH KANAN SIDEBAR */
    .main-content-wrapper { 
      margin-left: 200px; 
      padding: 40px; 
      min-height: 100vh;
    }

    /* KOTAK PUTIH UTAMA (Card-Box Form Konten) */
    .container-box {
      background: #ffffff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.03);
    }
  </style>
</head>
<body>

 <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-logo mb-4 fw-bold p-2">💊 GoApotek</div>
    <a href="index.html">🏠 Beranda</a>
    
    <a href="#subMenuData" data-bs-toggle="collapse" class="d-flex justify-content-between align-items-center">
      <span>📁 Data</span>
      <i class="bi bi-chevron-down" style="font-size: 0.8rem;"></i>
    </a>
    
    <div class="collapse show" id="subMenuData" style="padding-left: 15px; background: rgba(0,0,0,0.05); border-radius: 4px;">
      <a href="dataobat.html">💊 Data Obat</a>
      <a href="dokterpraktek.html">🩺 Dokter Praktek</a>
      <a href="rekammedis.html">📋 Rekam Medis</a>
      <a href="Penjualan.html">🛒 Penjualan</a>
      <a href="user.html" class="active">🧑‍🧒‍🧒 User</a>
    </div>

    <a href="laporan.html">📈 Laporan</a>
    <a href="logout.html">🚪 Logout</a>
  </nav>


  <!-- KONTEN AREA UTAMA SEBELAH KANAN SIDEBAR -->
  <main class="main-content-wrapper">
    <div class="container-fluid p-0">
      
      <h4 class="fw-bold mb-4" style="font-size: 18px !important;">Tambah Data User</h4>

      <!-- Bungkus Form dengan Kotak Putih Melayang Standar Sistem -->
      <div class="container-box">
        <form
          id="form_user"
          action="simpan_user.php"
          method="POST"
          class="needs-validation"
          novalidate
        >
          <div class="row g-3">
            <div class="col-md-6">
              <label for="nama_lengkap" class="form-label fw-bold">Nama Lengkap</label>
              <input
                id="nama_lengkap"
                name="nama_lengkap"
                type="text"
                class="form-control"
                placeholder=""
                required
              />
              <div class="invalid-feedback">Nama lengkap wajib diisi.</div>
            </div>
            
            <div class="col-md-6">
              <label for="username" class="form-label fw-bold">Username</label>
              <input
                id="username"
                name="username"
                type="text"
                class="form-control"
                placeholder=""
                required
              />
              <div class="invalid-feedback">Username wajib diisi.</div>
            </div>

            <div class="col-md-6">
              <label for="password" class="form-label fw-bold">Password</label>
              <input
                id="password"
                name="password"
                type="password"
                class="form-control"
                placeholder=""
                required
              />
              <div class="invalid-feedback">Password wajib diisi.</div>
            </div>

            <div class="col-md-6">
              <label for="role" class="form-label fw-bold">Hak Akses</label>
              <select id="role" name="role" class="form-select">
                <option value="Admin">Admin</option>
              </select>
            </div>

            <div class="col-md-6">
              <label for="no_hp" class="form-label fw-bold">Nomor WhatsApp/HP</label>
              <input
                id="no_hp"
                name="no_hp"
                type="text"
                class="form-control"
                placeholder=""
              />
            </div>

            <div class="col-md-6">
              <label for="status_user" class="form-label fw-bold">Status Akun</label>
              <select id="status_user" name="status_user" class="form-select">
                <option value="Aktif">Aktif</option>
                <option value="Nonaktif">Nonaktif</option>
              </select>
            </div>

            <div class="col-12">
              <label for="alamat" class="form-label fw-bold">Alamat Rumah</label>
              <textarea
                id="alamat"
                name="alamat"
                class="form-control"
                rows="3"
                placeholder=""
              ></textarea>
            </div>
          </div>
          
          <div class="mt-4 d-flex gap-2">
            <button type="submit" class="btn btn-success px-4 fw-bold">Simpan User</button>
            <a href="user.html" class="btn btn-secondary px-4">Kembali</a>
          </div>
        </form>
      </div>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Validasi Bootstrap bawaan form
    (() => {
      'use strict'
      const forms = document.querySelectorAll('.needs-validation')
      Array.from(forms).forEach(form => {
        form.addEventListener('submit', event => {
          if (!form.checkValidity()) {
            event.preventDefault()
            event.stopPropagation()
          }
          form.classList.add('was-validated')
        }, false)
      })
    })()
  </script>
</body>
</html>
