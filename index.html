<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beranda - GoApotek</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/font-bootstrap-icons.css">
  
  <style>
    /* Tambahan font universal 12px untuk semua elemen */
    * { font-size: 12px; }

    /* Mencegah pergeseran layout horizontal */
    html, body { 
      max-width: 100%;
      overflow-x: hidden;
      background-color: #e0f7fa; 
      margin: 0; 
    }
    
    /* Sidebar - Menetap Stabil di Kiri */
    .sidebar { position: fixed; top: 0; left: 0; width: 200px; height: 100vh; background-color: #cca8e9; padding: 20px 10px; z-index: 1000; }
    .sidebar a { display: block; padding: 10px 15px; text-decoration: none; color: #333; font-weight: 500; }
    .sidebar a:hover, .sidebar a.active { background: rgba(255,255,255,0.4); border-radius: 5px; }
    
    .submenu-box {
      padding-left: 15px; 
      background: rgba(0,0,0,0.05); 
      border-radius: 4px;
    }
    
    /* Layout Utama Kanan */
    .main-wrapper { 
      margin-left: 200px; 
      padding: 20px; 
      box-sizing: border-box;
    }
    .container { max-width: 1140px; width: 100%; }
    
    /* Card Stat - Layout Fleksibel Kanan-Kiri */
    .card-stat { 
      padding: 20px; 
      border-radius: 10px; 
      border: none; 
      box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
      transition: 0.3s; 
      background-color: #ffffff;
    }
    .card-stat:hover { transform: translateY(-5px); box-shadow: 0 6px 12px rgba(0,0,0,0.1); }
    
    /* Desain Ikon Stat */
    .stat-icon {
      font-size: 24px;
      opacity: 0.8;
    }
  </style>
</head>
<body>

  <!-- Sidebar - Desain Konsisten GoApotek -->
  <nav class="sidebar">
    <a href="#" class="fw-bold mb-2 d-block" style="pointer-events: none;">💊 GoApotek</a>
    <a href="index.html" class="active">🏠 Beranda</a>
    
    <a href="#subMenuData" data-bs-toggle="collapse" class="d-flex justify-content-between align-items-center" aria-expanded="true">
      <span>📁 Data</span><i class="bi bi-chevron-down"></i>
    </a>
    
    <div class="collapse show submenu-box" id="subMenuData">
      <a href="dataobat.html">💊 Data Obat</a>
      <a href="dokterpraktek.html">🩺 Dokter Praktek</a>
      <a href="riwayatkunjungan.html">📋 Rekam Medis</a>
      <a href="Penjualan.html">🛒 Penjualan</a>
      <a href="user.html">🧑‍🧒‍🧒 User</a>
    </div>

    <a href="laporan.html">📈 Laporan</a>
    <a href="logout.html">🚪 Logout</a>
  </nav>

  <!-- Konten Utama -->
  <main class="main-wrapper">
    <div class="container">
      <h2 class="fw-bold mb-4" style="font-size: 16px !important;">Beranda</h2>

      <div class="row g-4">
        <!-- Card 1: Total Obat -->
        <div class="col-md-4">
          <a href="dataobat.html" class="text-decoration-none text-dark">
            <div class="card card-stat h-100 d-flex flex-row align-items-center justify-content-between">
              <div>
                <h6 class="text-muted mb-1">Total Obat</h6>
                <h3 class="fw-bold m-0" style="font-size: 20px !important;">775</h3>
              </div>
              <span class="stat-icon">💊</span>
            </div>
          </a>
        </div>
        
        <!-- Card 2: Obat Expired -->
        <div class="col-md-4">
          <a href="expired.html" class="text-decoration-none text-dark">
            <div class="card card-stat h-100 d-flex flex-row align-items-center justify-content-between">
              <div>
                <h6 class="text-muted mb-1">Obat Expired</h6>
                <h3 class="fw-bold m-0 text-danger" style="font-size: 20px !important;">70</h3>
              </div>
              <span class="stat-icon">⚠️</span>
            </div>
          </a>
        </div>
        
        <!-- Card 3: Transaksi Hari Ini -->
        <div class="col-md-4">
          <a href="harian.html" class="text-decoration-none text-dark">
            <div class="card card-stat h-100 d-flex flex-row align-items-center justify-content-between">
              <div>
                <h6 class="text-muted mb-1">Transaksi Hari Ini</h6>
                <h3 class="fw-bold m-0" style="font-size: 20px !important;">70</h3>
              </div>
              <span class="stat-icon">🛒</span>
            </div>
          </a>
        </div>
        
        <!-- Card 4: Dokter Praktek -->
        <div class="col-md-4">
          <a href="dokterpraktek.html" class="text-decoration-none text-dark">
            <div class="card card-stat h-100 d-flex flex-row align-items-center justify-content-between">
              <div>
                <h6 class="text-muted mb-1">Dokter Praktek</h6>
                <h3 class="fw-bold m-0" style="font-size: 20px !important;">3</h3>
              </div>
              <span class="stat-icon">👨‍⚕️</span>
            </div>
          </a>
        </div>
        
        <!-- Card 5: Pasien -->
        <div class="col-md-4">
          <a href="riwayatkunjungan.html" class="text-decoration-none text-dark">
            <div class="card card-stat h-100 d-flex flex-row align-items-center justify-content-between">
              <div>
                <h6 class="text-muted mb-1">Pasien</h6>
                <h3 class="fw-bold m-0" style="font-size: 20px !important;">2</h3>
              </div>
              <span class="stat-icon">👥</span>
            </div>
          </a>
        </div>
        
        <!-- Card 6: Laporan Transaksi -->
        <div class="col-md-4">
          <a href="laporan.html" class="text-decoration-none text-dark">
            <div class="card card-stat h-100 d-flex flex-row align-items-center justify-content-between">
              <div>
                <h6 class="text-muted mb-1">Laporan Transaksi</h6>
                <h3 class="fw-bold m-0 text-primary" style="font-size: 14px !important;">Lihat Data</h3>
              </div>
              <span class="stat-icon">📊</span>
            </div>
          </a>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
