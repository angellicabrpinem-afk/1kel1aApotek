<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tambah Data Dokter - GoApotek</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet"/>
  
  <style>
    /* Tambahan font universal 12px untuk semua elemen */
    * { font-size: 12px; }
    
    /* Mencegah halaman bergerak/geser ke kiri dan kanan (Anti-Scroll Horizontal) */
    html, body { 
      max-width: 100%;
      overflow-x: hidden;
      background-color: #e0f7fa; 
      margin: 0; 
    }
    
    /* Sidebar - Menetap Stabil di Kiri */
    .sidebar { position: fixed; top: 0; left: 0; width: 200px; height: 100vh; background-color: #cca8e9; padding: 20px 10px; z-index: 1000; }
    .sidebar a { display: block; padding: 10px 15px; text-decoration: none; color: #333; font-weight: 500; }
    .sidebar a:hover, .sidebar a.active { background: rgba(255,255,255,0.4); border-radius: 5px; }
    
    .submenu-box {
      padding-left: 15px; 
      background: rgba(0,0,0,0.05); 
      border-radius: 4px;
    }
    
    /* Layout Utama Kanan - Mengunci pergeseran layout */
    .main-wrapper { 
      margin-left: 200px; 
      padding: 20px; 
      box-sizing: border-box;
    }
    .container { max-width: 1140px; width: 100%; }
    
    /* Card Formulir Kotak Putih */
    .card { border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-radius: 10px; background-color: #ffffff; }
  </style>
</head>
<body>

  <!-- Sidebar - Desain Konsisten GoApotek -->
  <nav class="sidebar">
    <a href="#" class="fw-bold mb-2 d-block" style="pointer-events: none;">💊 GoApotek</a>
    <a href="index.html">🏠 Beranda</a>
    
    <a href="#subMenuData" data-bs-toggle="collapse" class="d-flex justify-content-between align-items-center" aria-expanded="true">
      <span>📁 Data</span><i class="bi bi-chevron-down"></i>
    </a>
    
    <div class="collapse show submenu-box" id="subMenuData">
      <a href="dataobat.html">💊 Data Obat</a>
      <a href="dokterpraktek.html" class="active">🩺 Dokter Praktek</a>
      <a href="riwayatkunjungan.html">📋 Rekam Medis</a>
      <a href="Penjualan.html">🛒 Penjualan</a>
      <a href="user.html">🧑‍🧒‍🧒 User</a>
    </div>

    <a href="laporan.html">📈 Laporan</a>
    <a href="logout.html">🚪 Logout</a>
  </nav>

  <!-- Konten Utama Halaman -->
  <main class="main-wrapper">
    <div class="container">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold m-0" style="font-size: 16px !important;">Tambah Data Dokter</h2>
        <a href="dokterpraktek.html" class="btn btn-outline-secondary">🔙 Kembali</a>
      </div>
      
      <div class="card p-4">
        <form
          id="form_dokter"
          action="simpan_dokter.php"
          method="POST"
          enctype="multipart/form-data"
          class="needs-validation"
          novalidate
        >
          <div class="row g-3">
            <div class="col-md-6">
              <label for="nama_dokter" class="form-label fw-semibold">Nama Dokter</label>
              <input
                id="nama_dokter"
                name="nama_dokter"
                type="text"
                class="form-control"
                placeholder=""
                required
              />
              <div class="invalid-feedback">Nama dokter wajib diisi.</div>
            </div>
            
            <div class="col-md-6">
              <label for="id_dokter" class="form-label fw-semibold">ID Dokter</label>
              <input
                id="id_dokter"
                name="id_dokter"
                type="text"
                class="form-control"
                placeholder=""
                required
              />
              <div class="invalid-feedback">ID Dokter wajib diisi.</div>
            </div>

            <div class="col-md-6">
              <label for="spesialis" class="form-label fw-semibold">Spesialis</label>
              <input
                id="spesialis"
                name="spesialis"
                type="text"
                class="form-control"
                placeholder=""
                required
              />
              <div class="invalid-feedback">Spesialis wajib diisi.</div>
            </div>

            <div class="col-md-6">
              <label for="kontak" class="form-label fw-semibold">Kontak / No. Telp</label>
              <input
                id="kontak"
                name="kontak"
                type="text"
                class="form-control"
                placeholder=""
              />
            </div>

            <div class="col-12">
              <label for="jadwal" class="form-label fw-semibold">Jadwal Praktek</label>
              <input
                id="jadwal"
                name="jadwal"
                type="text"
                class="form-control"
                placeholder=""
              />
            </div>
            
            <div class="col-md-6">
              <label for="status" class="form-label fw-semibold">Status</label>
              <select id="status" name="status" class="form-select">
                <option value="Aktif">Aktif</option>
                <option value="Cuti">Cuti</option>
                <option value="Tidak Aktif">Tidak Aktif</option>
              </select>
            </div>
           
            <div class="col-md-6">
              <label for="foto_dokter" class="form-label fw-semibold">Foto Dokter</label>
              <input
                id="foto_dokter"
                name="foto_dokter"
                type="file"
                class="form-control"
                accept="image/*"
              />
            </div>

            <div class="col-12">
              <label for="pengalaman" class="form-label fw-semibold">Pengalaman & Riwayat Pendidikan</label>
              <textarea
                id="pengalaman"
                name="pengalaman"
                class="form-control"
                rows="3"
                placeholder=""
              ></textarea>
            </div>
          </div>
          
          <button type="submit" class="btn btn-success mt-4">Simpan Data</button>
        </form>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Validasi Bootstrap bawaan form
    (() => {
      'use strict'
      const forms = document.querySelectorAll('.needs-validation')
      Array.from(forms).forEach(form => {
        form.addEventListener('submit', event => {
          if (!form.checkValidity()) {
            event.preventDefault()
            event.stopPropagation()
          }
          form.classList.add('was-validated')
        }, false)
      })
    })()
  </script>
</body>
</html>
